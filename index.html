<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="にゃんこバド">
<meta name="theme-color" content="#E8956D">
<link rel="manifest" href="manifest.json">
<title>にゃんバドミントン</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FBF6EF;--surface:#FFFCF8;--paw:#E8956D;--paw-lt:#F7D5BB;--paw-dk:#C4643A;
  --cream:#F5EDE0;--cream-dk:#DDD0BC;--paw-soft:#F9EDE0;
  --text:#4A3728;--text-mid:#7A5C48;--text-lt:#B8957C;
  --green:#5F9E6E;--green-bg:#E5F5EB;--red:#C46868;--red-bg:#FAE8E8;
  --blue:#6888C4;--blue-bg:#E8EEFA;--amber:#C49A38;--amber-bg:#FAF2D8;
  --border:#E8D5C0;--shadow:rgba(160,100,60,.10);
}
html,body{height:100%;font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
button,input,select{font-family:inherit}
button{cursor:pointer;border:none;background:none}
input,select{outline:none}
@keyframes catBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes popIn{0%{transform:scale(.9)}60%{transform:scale(1.05)}100%{transform:scale(1)}}
.shimmer{animation:shimmer 2.5s ease-in-out infinite}
.pop-in{animation:popIn .3s ease both}

#header{flex-shrink:0;background:var(--surface);border-bottom:2px solid var(--border);padding:.4rem .75rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px var(--shadow)}
.app-name{font-weight:800;font-size:.9rem;color:var(--paw-dk);line-height:1.1}
.app-sub{font-size:.6rem;color:var(--text-lt)}
#hcat{display:inline-block;animation:catBounce 2s ease-in-out infinite}.cat-img{width:2.2em;height:2.2em;object-fit:contain;vertical-align:middle}.cat-img-sm{width:1.9em;height:1.9em;object-fit:contain;vertical-align:middle}.free-img{width:1.6em;height:1.6em;object-fit:contain;vertical-align:middle}
#hstats{display:flex;gap:.28rem;align-items:center}

#tab-bar{flex-shrink:0;display:flex;gap:.22rem;padding:.4rem .65rem;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
#tab-bar::-webkit-scrollbar{display:none}
.tb{padding:.28rem .75rem;border-radius:999px;border:2px solid var(--border);background:transparent;color:var(--text-mid);font-weight:700;font-size:.76rem;white-space:nowrap;transition:all .15s}
.tb.on{background:var(--paw);border-color:var(--paw-dk);color:#fff}

#main{flex:1;overflow-y:auto;padding:.55rem .65rem;-webkit-overflow-scrolling:touch}
.page{display:none}.page.on{display:block}.hidden{display:none !important}
.stitle{font-size:.85rem;font-weight:800;color:var(--paw-dk);display:flex;align-items:center;gap:.3rem;margin-bottom:.5rem}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:.75rem;margin-bottom:.55rem}

.tag{display:inline-flex;align-items:center;gap:.15rem;padding:.1rem .45rem;border-radius:999px;font-size:.66rem;font-weight:700;line-height:1.4}
.tf{background:var(--green-bg);color:var(--green)}
.tp{background:var(--amber-bg);color:var(--amber)}
.tr{background:var(--cream);color:var(--text-lt)}
.td{background:var(--green-bg);color:var(--green)}
.tm{background:var(--blue-bg);color:var(--blue)}
.lv0{background:#E8F5EB;color:#4A8C5C;font-size:.62rem}
.lv1{background:#E8EEFA;color:#4A6AAA;font-size:.62rem}
.lv2{background:#FAF2D8;color:#8A6A18;font-size:.62rem}
.lv3{background:#FAE8E8;color:#A04040;font-size:.62rem}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:.22rem;padding:.38rem .85rem;border-radius:9px;font-weight:700;font-size:.8rem;white-space:nowrap;border:2px solid transparent;transition:all .15s;line-height:1}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.4;pointer-events:none}
.ba{background:var(--paw);color:#fff;border-color:var(--paw-dk)}
.bg{background:var(--cream);color:var(--text-mid);border-color:var(--cream-dk)}
.bs{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.bd{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.bsm{padding:.5rem .9rem;font-size:.82rem;border-radius:9px}
.bxs{padding:.16rem .44rem;font-size:.68rem;border-radius:6px}

.inp{width:100%;padding:.42rem .65rem;border-radius:9px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:.85rem}
.inp:focus{border-color:var(--paw);outline:none}
.inpsm{padding:.28rem .52rem;font-size:.78rem;border-radius:7px}
.row{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}

/* コートグリッド */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.55rem}
.cgrid.c1{grid-template-columns:1fr}
.cc{border:2px solid var(--paw-lt);border-radius:16px;padding:.7rem .65rem;box-shadow:0 2px 10px var(--shadow);min-width:0}
.cA{background:linear-gradient(150deg,#FFFDF9,#FFF5E8)}
.cB{background:linear-gradient(150deg,#F5FBFF,#EAF3FF);border-color:#B8D4F0}
.cC{background:linear-gradient(150deg,#F5FFF8,#E5F8EC);border-color:#A8D8B4}
.cD{background:linear-gradient(150deg,#FFF8F5,#FFE8F0);border-color:#F0B8CC}
.chead{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.45rem}
.cname{font-weight:800;font-size:.85rem;color:var(--text)}
.ctags{display:flex;gap:.25rem;flex-wrap:wrap;margin-top:.2rem}
.dempty{text-align:center;padding:.55rem 0;color:var(--text-lt);font-size:.68rem}
.tblock{background:rgba(255,255,255,.75);border-radius:9px;padding:.32rem .5rem;text-align:center;font-weight:700;font-size:.78rem;color:var(--text);line-height:1.3}
.vslbl{text-align:center;font-size:.8rem;font-weight:800;color:var(--paw);letter-spacing:1px;margin:.18rem 0}
.cbtns{display:flex;gap:.28rem;flex-wrap:wrap;margin-top:.45rem}

/* メンバー行（2段） */
.mrow{display:flex;flex-direction:column;padding:.45rem .65rem;border-radius:11px;border:1.5px solid var(--border);background:var(--surface);margin-bottom:.35rem;gap:.3rem}
.mrow-top{display:flex;align-items:center;gap:.4rem}
.mrow-bot{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;padding-left:.1rem}
.gicon{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.88rem}
.gm{background:var(--blue-bg)}.gf{background:#FFE8F2}
.mname{font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}

/* 会員行 */
.crow{display:flex;align-items:center;gap:.5rem;padding:.5rem .65rem;border-radius:11px;border:1.5px solid var(--border);background:var(--surface);margin-bottom:.38rem}
.crow.attending{background:#F0FBF3;border-color:#A8D8B4}
.crow-info{flex:1;min-width:0}
.crow-name{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crow-sub{display:flex;gap:.3rem;margin-top:.18rem;flex-wrap:wrap;align-items:center}
/* 出欠ボタン */
.att-btn{padding:.32rem .75rem;border-radius:999px;font-weight:700;font-size:.78rem;border:2px solid;transition:all .15s;white-space:nowrap}
.att-btn:active{transform:scale(.95)}
.att-on{background:var(--green);color:#fff;border-color:var(--green)}
.att-off{background:var(--cream);color:var(--text-mid);border-color:var(--cream-dk)}

.chips{display:flex;flex-wrap:wrap;gap:.3rem}
.chip{padding:.18rem .52rem;border-radius:999px;background:var(--cream);color:var(--text);font-size:.76rem;font-weight:700;border:1px solid var(--border)}
.prow{display:flex;align-items:center;justify-content:space-between;padding:.36rem .6rem;border-radius:8px;background:var(--paw-soft);margin-bottom:.28rem;border:1px solid var(--paw-lt)}
.cchip{padding:.22rem .55rem;border-radius:999px;background:var(--cream);border:1px solid var(--border);font-size:.76rem;font-weight:700;display:inline-flex;align-items:center;gap:.25rem}
.cbadge{background:var(--paw);color:#fff;border-radius:999px;padding:.02rem .36rem;font-size:.66rem}
.srow{display:flex;align-items:center;justify-content:space-between;padding:.45rem .7rem;border-radius:9px;background:var(--cream);margin-bottom:.35rem;border:1px solid var(--border)}

#footer{flex-shrink:0;text-align:center;padding:.6rem;color:var(--text-lt);font-size:.65rem}

#del-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
#del-panel.show{display:flex}
#del-box{background:var(--surface);border-radius:20px;padding:1.4rem 1.2rem;max-width:280px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
#del-msg{font-weight:700;font-size:.95rem;margin-bottom:1rem;color:var(--text);line-height:1.5}
#del-btns{display:flex;gap:.6rem;justify-content:center}

#toast{position:fixed;bottom:1.1rem;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:.45rem 1rem;border-radius:999px;font-size:.8rem;font-weight:700;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:999;max-width:90vw;text-align:center}
#toast.show{opacity:1}

@media(max-width:380px){
  .cc{padding:.6rem .5rem}
  .tblock{font-size:.72rem}
}

/* ── タブレット大画面モード（768px以上） ── */
@media(min-width:768px){
  /* ヘッダーをコンパクトに */
  #header{padding:.35rem .9rem}
  .app-name{font-size:.85rem}
  #tab-bar{padding:.35rem .9rem}

  /* ホームページをフル画面に */
  #p-home.on{
    display:flex !important;flex-direction:column;
    height:calc(100vh - 110px); /* ヘッダー+タブ分を引く */
    overflow:hidden;
  }
  #p-home .stitle{margin-bottom:.35rem;font-size:.8rem}

  /* コートグリッド：画面いっぱいに */
  #p-home .cgrid{
    flex:1;
    display:grid !important;
    grid-template-columns:1fr 1fr !important;
    grid-template-rows:1fr 1fr;
    gap:.5rem;
    margin-bottom:.4rem;
    min-height:0;
  }
  #p-home .cgrid.c1{grid-template-columns:1fr !important;grid-template-rows:1fr}

  /* コートカード：縦いっぱいに伸ばす */
  #p-home .cc{
    display:flex;flex-direction:column;
    padding:.7rem .9rem;
    min-height:0;overflow:hidden;
  }

  /* コートヘッダー */
  #p-home .chead{margin-bottom:.4rem;flex-shrink:0}
  #p-home .cname{font-size:1rem}

  /* 試合表示エリアを縦いっぱいに */
  #p-home .cc > div:nth-child(2){
    flex:1;display:flex;flex-direction:column;justify-content:center;
    min-height:0;
  }

  /* チームブロック：大きく */
  #p-home .tblock{
    padding:.5rem .7rem;
    border-radius:12px;
    font-size:1.5rem !important;
    font-weight:800 !important;
    line-height:1.5;
  }

  /* VS */
  #p-home .vslbl{
    font-size:1.3rem;
    margin:.3rem 0;
  }

  /* 抽選前の猫 */
  #p-home .dempty{padding:.5rem 0}
  #p-home .dempty > div:first-child{font-size:3rem !important}
  #p-home .dempty > div:last-child{font-size:1rem}

  /* ボタン */
  #p-home .cbtns{margin-top:.5rem;flex-shrink:0;gap:.4rem}
  #p-home .btn.bsm{padding:.5rem 1.1rem;font-size:.9rem}

  /* フリー待機とリセットボタンをコンパクトに */
  #free-sec{padding:.5rem .75rem;margin-bottom:.3rem !important;flex-shrink:0}
  #free-sec > div:first-child{font-size:.75rem;margin-bottom:.25rem}
  #fchips .chip{font-size:.72rem;padding:.15rem .45rem}
  #p-home > button.btn{padding:.35rem .8rem;font-size:.75rem}

}

/* タブレット横向き時は名前を小さく */
@media(min-width:768px) and (orientation:landscape){
  #p-home .tblock{
    font-size:1.0rem !important;
    line-height:1.3;
  }
  #p-home .vslbl{
    font-size:1.0rem;
    margin:.15rem 0;
  }
}

/* 男性=黒・女性=赤（スマホ・タブレット共通） */
.name-male{color:#1A1A1A !important;font-weight:800}
.name-female{color:#D44040 !important;font-weight:800}
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:.4rem">
    <span id="hcat"><img src="./img/face.png" class="cat-img" alt="にゃんこ"></span>
    <div><div class="app-name">にゃんバドミントン</div><div class="app-sub">対戦組み合わせアプリ</div></div>
  </div>
  <div id="hstats"></div>
</div>

<div id="tab-bar">
  <button class="tb on" onclick="goTab('home')">🏠 ホーム</button>
  <button class="tb" onclick="goTab('roster')">📋 会員</button>
  <button class="tb" onclick="goTab('members')"><img src="./img/face.png" class="cat-img-sm" style="margin-right:.2em" alt=""> メンバー</button>
  <button class="tb" onclick="goTab('settings')">⚙️ 設定</button>
</div>

<div id="main">

  <!-- ホーム -->
  <div id="p-home" class="page on">
    <div class="stitle">🐾 コート一覧</div>
    <div id="cgrid" class="cgrid"></div>
    <div id="free-sec" class="card" style="margin-bottom:.5rem">
      <div style="font-weight:700;font-size:.8rem;color:var(--text-mid);margin-bottom:.35rem"><img src="./img/free.png" style="width:1.6em;height:1.6em;object-fit:contain;vertical-align:middle"> フリー待機中（<span id="fcnt">0</span>人）</div>
      <div id="fchips" class="chips"></div>
    </div>
    <button class="btn bg bsm" onclick="resetAll()">🔄 全員フリーに戻す</button>
  </div>

  <!-- 会員一覧 -->
  <div id="p-roster" class="page hidden">
    <div class="card">
      <div class="stitle">📋 会員登録</div>
      <div class="row" style="margin-bottom:.35rem">
        <input class="inp" id="rname" placeholder="名前（最大12文字）" maxlength="12" style="flex:2 1 110px" onkeydown="if(event.key==='Enter')addRoster()">
        <select class="inp" id="rgender" style="flex:1 1 75px;width:auto">
          <option value="male">♂ 男性</option>
          <option value="female">♀ 女性</option>
        </select>
        <select class="inp" id="rlevel" style="flex:1 1 80px;width:auto">
          <option value="0">🌱 初心</option>
          <option value="1">🔵 初級</option>
          <option value="2">🟡 中級</option>
          <option value="3">🔴 上級</option>
        </select>
        <button class="btn ba bsm" onclick="addRoster()">追加</button>
      </div>
      <div style="font-size:.68rem;color:var(--text-lt)">会員数: <span id="rcnt">0</span>人</div>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
        <div class="stitle" style="margin-bottom:0">📋 会員一覧</div>
        <div style="display:flex;gap:.35rem;align-items:center">
          <span style="font-size:.72rem;color:var(--text-mid)">参加: <span id="att-cnt">0</span>人</span>
          <button class="btn bd bxs" onclick="resetAttendance()">出欠リセット</button>
        </div>
      </div>
      <div id="rlist"></div>
    </div>

    <div class="card" style="background:var(--green-bg);border-color:var(--green)">
      <div style="font-size:.8rem;font-weight:700;color:var(--green);margin-bottom:.4rem">🏸 参加者をメンバーに反映</div>
      <div style="font-size:.75rem;color:var(--text-mid);margin-bottom:.65rem">「参加」にした会員をメンバー一覧に追加します。既存メンバーはリセットされます。</div>
      <button class="btn bs bsm" onclick="applyRosterToMembers()">✅ メンバーに反映する</button>
    </div>
  </div>

  <!-- メンバー -->
  <div id="p-members" class="page hidden">
    <div class="card">
      <div class="stitle">🐾 メンバー追加</div>
      <div class="row" style="margin-bottom:.35rem">
        <input class="inp" id="iname" placeholder="名前（最大12文字）" maxlength="12" style="flex:2 1 110px" onkeydown="if(event.key==='Enter')addMember()">
        <select class="inp" id="igender" style="flex:1 1 75px;width:auto">
          <option value="male">♂ 男性</option>
          <option value="female">♀ 女性</option>
        </select>
        <select class="inp" id="ilevel" style="flex:1 1 80px;width:auto">
          <option value="0">🌱 初心</option>
          <option value="1">🔵 初級</option>
          <option value="2">🟡 中級</option>
          <option value="3">🔴 上級</option>
        </select>
        <button class="btn ba bsm" onclick="addMember()">🐾 追加</button>
      </div>
      <div style="font-size:.68rem;color:var(--text-lt)">登録数: <span id="mcnt">0</span> / 40人</div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
        <div class="stitle" style="margin-bottom:0">🐾 メンバー一覧</div>
        <button class="btn bd bxs" onclick="askDeleteAll()">🗑 全員削除</button>
      </div>
      <div id="mlist"></div>
    </div>
    <div class="card">
      <div class="stitle">🔗 固定ペア設定</div>
      <div class="row" style="margin-bottom:.6rem">
        <select class="inp" id="pa" style="flex:1 1 95px;width:auto"><option value="">選択…</option></select>
        <span style="color:var(--paw);font-weight:800">&amp;</span>
        <select class="inp" id="pb" style="flex:1 1 95px;width:auto"><option value="">選択…</option></select>
        <button class="btn ba bsm" onclick="addPair()">🔗 固定</button>
      </div>
      <div id="plist"></div>
    </div>
  </div>

  <!-- 設定 -->
  <div id="p-settings" class="page hidden">
    <div class="card">
      <div class="stitle">🐾 セッション設定</div>
      <div style="margin-bottom:.8rem">
        <div style="font-size:.76rem;color:var(--text-mid);font-weight:700;margin-bottom:.35rem">コート数</div>
        <div class="row" id="ccbtns"></div>
      </div>
      <div>
        <div style="font-size:.76rem;color:var(--text-mid);font-weight:700;margin-bottom:.4rem">各コートの設定</div>
        <div id="cmlist"></div>
      </div>
    </div>
    <div class="card">
      <div class="stitle">🐾 出場回数</div>
      <div id="pclist" class="chips" style="margin-bottom:.6rem"></div>
      <button class="btn bg bsm" onclick="resetCount()">🔄 回数リセット</button>
    </div>
  </div>

</div>

<div id="footer">🐾 にゃんバドミントン &nbsp;|&nbsp; 楽しく遊ぶにゃ〜 <img src="./img/face.png" style="width:1.4em;height:1.4em;object-fit:contain;vertical-align:middle"></div>

<div id="del-panel">
  <div id="del-box">
    <div id="del-msg"></div>
    <div id="del-btns">
      <button class="btn bg" onclick="delCancel()">キャンセル</button>
      <button class="btn bd" id="del-ok">削除する</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// =====================================================
// 定数
// =====================================================
var LEVELS=['🌱初心','🔵初級','🟡中級','🔴上級'];
var LEVEL_TAGS=['lv0','lv1','lv2','lv3'];
var COURT_LEVELS={
  'all':{label:'無差別',tag:'td',levels:[0,1,2,3]},
  'l0':{label:'初心のみ',tag:'lv0',levels:[0]},
  'l01':{label:'初心&初級',tag:'lv0',levels:[0,1]},
  'l1':{label:'初級のみ',tag:'lv1',levels:[1]},
  'l12':{label:'初級&中級',tag:'lv1',levels:[1,2]},
  'l2':{label:'中級のみ',tag:'lv2',levels:[2]},
  'l23':{label:'中級&上級',tag:'lv2',levels:[2,3]},
  'l3':{label:'上級のみ',tag:'lv3',levels:[3]}
};
var COURT_LEVEL_ORDER=['all','l0','l01','l1','l12','l2','l23','l3'];
var COURT_LEVEL_LABELS={'all':'無差別','l0':'初心のみ','l01':'初心&初級','l1':'初級のみ','l12':'初級&中級','l2':'中級のみ','l23':'中級&上級','l3':'上級のみ'};

// =====================================================
// ストレージ
// =====================================================
var K={M:'nb9m',P:'nb9p',S:'nb9s',C:'nb9c',R:'nb9r'};
function load(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function saveAll(){
  try{
    localStorage.setItem(K.M,JSON.stringify(MB));
    localStorage.setItem(K.P,JSON.stringify(FP));
    localStorage.setItem(K.S,JSON.stringify(SS));
    localStorage.setItem(K.C,JSON.stringify(PC));
    localStorage.setItem(K.R,JSON.stringify(RS));
  }catch(e){}
}

var MB=load(K.M,[]);
var FP=load(K.P,[]);
var PC=load(K.C,{});
var RS=load(K.R,[]); // 会員一覧
var SS=load(K.S,{
  n:2,
  courts:[
    {id:'A',name:'Aコート',mode:'doubles',clevel:'all',draw:null,ok:false,pids:[]},
    {id:'B',name:'Bコート',mode:'doubles',clevel:'all',draw:null,ok:false,pids:[]}
  ]
});

// 既存データの補完
for(var _i=0;_i<MB.length;_i++){if(MB[_i].level===undefined)MB[_i].level=0;}
for(var _i=0;_i<SS.courts.length;_i++){
  var _cl=SS.courts[_i].clevel;
  if(!_cl||_cl==='all')SS.courts[_i].clevel='all';
  else if(_cl==='low')SS.courts[_i].clevel='l01';
  else if(_cl==='high')SS.courts[_i].clevel='l23';
}

var seq=Date.now();
function nid(){return 'u'+(++seq)}

// =====================================================
// 削除確認パネル
// =====================================================
var _delCb=null;
function askDel(msg,cb){
  document.getElementById('del-msg').textContent=msg;
  _delCb=cb;
  document.getElementById('del-panel').classList.add('show');
}
function delCancel(){
  document.getElementById('del-panel').classList.remove('show');
  _delCb=null;
}
document.getElementById('del-ok').onclick=function(){
  document.getElementById('del-panel').classList.remove('show');
  if(_delCb)_delCb();_delCb=null;
};

// =====================================================
// トースト
// =====================================================
var tt=null;
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(tt);tt=setTimeout(function(){el.classList.remove('show')},2600);
}

// =====================================================
// タブ
// =====================================================
function goTab(id){
  var pages=['home','roster','members','settings'];
  for(var i=0;i<pages.length;i++){
    var el=document.getElementById('p-'+pages[i]);
    el.classList.remove('on');
    el.classList.add('hidden');
  }
  var activeEl=document.getElementById('p-'+id);
  activeEl.classList.remove('hidden');
  activeEl.classList.add('on');
  var btns=document.querySelectorAll('.tb');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('on');
  var labels={home:'ホーム',roster:'会員',members:'メンバー',settings:'設定'};
  for(var i=0;i<btns.length;i++){
    if(btns[i].textContent.indexOf(labels[id])>=0) btns[i].classList.add('on');
  }
  draw();
}

// =====================================================
// 描画
// =====================================================
var CAT_IMG={A:'./img/court_a.png',B:'./img/court_b.png',C:'./img/court_c.png',D:'./img/court_d.png'};
var CAT_FACE='./img/face.png';
var CAT_FREE='./img/free.png';
var CAT={A:'🐱',B:'🐈',C:'🐈‍⬛',D:'😺'};

function draw(){
  drawHeader();drawCourts();drawFree();
  drawRoster();drawMembers();drawPairs();
  drawCourtSettings();drawCount();drawCourtNBtns();
  document.getElementById('mcnt').textContent=MB.length;
  document.getElementById('rcnt').textContent=RS.length;
  var attCnt=0;for(var i=0;i<RS.length;i++) if(RS[i].attending) attCnt++;
  document.getElementById('att-cnt').textContent=attCnt;
  drawPairSelects();
}

// ヘッダー
function drawHeader(){
  var free=0,play=0,rest=0;
  for(var i=0;i<MB.length;i++){
    if(MB[i].status==='free')free++;
    else if(MB[i].status==='playing')play++;
    else rest++;
  }
  var el=document.getElementById('hstats');
  el.innerHTML='<span class="tag tf"><img src="'+CAT_FREE+'" class="free-img" alt="">'+free+'</span>'
    +'<span class="tag tp" style="margin-left:.22rem">🏸'+play+'</span>'
    +(rest>0?'<span class="tag tr" style="margin-left:.22rem">💤'+rest+'</span>':'');
}

// コートカード
function drawCourts(){
  var el=document.getElementById('cgrid');el.innerHTML='';
  if(MB.length<4){
    el.className='cgrid';
    el.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:2rem .8rem;background:var(--surface);border-radius:16px;border:2px dashed var(--border)">'
      +'<div><img src="./img/good.png" style="width:4rem;height:4rem;object-fit:contain"></div>'
      +'<div style="font-weight:700;color:var(--text-mid);margin-top:.4rem">メンバーを4人以上登録するにゃ〜</div>'
      +'<button class="btn ba" style="margin-top:.75rem" onclick="goTab(\'members\')">🐾 追加する</button></div>';
    document.getElementById('free-sec').style.display='none';
    return;
  }
  document.getElementById('free-sec').style.display='';
  el.className='cgrid'+(SS.n===1?' c1':'');

  for(var i=0;i<SS.courts.length;i++){
    var c=SS.courts[i];
    var clvInfo=COURT_LEVELS[c.clevel]||COURT_LEVELS['all'];
    var card=document.createElement('div');
    card.className='cc c'+c.id;

    var head=document.createElement('div');head.className='chead';
    var nameWrap=document.createElement('div');
    var nm=document.createElement('div');nm.className='cname';
    var catSrc=CAT_IMG[c.id]||CAT_FACE;nm.innerHTML='<img src="'+catSrc+'" class="cat-img-sm" alt=""> '+c.name;
    nameWrap.appendChild(nm);
    var ctags=document.createElement('div');ctags.className='ctags';
    var mt=document.createElement('span');mt.className='tag '+(c.mode==='mixed'?'tm':'td');
    mt.textContent=c.mode==='mixed'?'ミックスD':'ダブルス';
    var lt=document.createElement('span');lt.className='tag '+clvInfo.tag;
    lt.textContent=clvInfo.label;
    ctags.appendChild(mt);ctags.appendChild(lt);
    nameWrap.appendChild(ctags);
    head.appendChild(nameWrap);
    if(c.ok){var pt=document.createElement('span');pt.className='tag tp';pt.textContent='🏸試合中';head.appendChild(pt);}
    card.appendChild(head);

    var da=document.createElement('div');
    if(!c.draw){
      da.className='dempty shimmer';
      da.innerHTML='<div><img src="'+(CAT_IMG[c.id]||CAT_FACE)+'" style="width:3rem;height:3rem;object-fit:contain"></div><div>抽選で決めるにゃ〜</div>';
    }else{
      da.className=c.ok?'':'pop-in';
      var b1=document.createElement('div');b1.className='tblock';
      b1.appendChild(makeTeamEl(c.draw.t1));
      var vs=document.createElement('div');vs.className='vslbl';vs.textContent='VS';
      var b2=document.createElement('div');b2.className='tblock';
      b2.appendChild(makeTeamEl(c.draw.t2));
      da.appendChild(b1);da.appendChild(vs);da.appendChild(b2);
    }
    card.appendChild(da);

    var cb=document.createElement('div');cb.className='cbtns';
    (function(court){
      if(!court.ok){
        var db=mkBtn('🎯抽選','btn ba bsm');db.onclick=function(){doDraw(court.id)};cb.appendChild(db);
        if(court.draw){
          var rb=mkBtn('🔁','btn bg bsm');rb.onclick=function(){doRedo(court.id)};cb.appendChild(rb);
          var kb=mkBtn('✅確定','btn bs bsm');kb.onclick=function(){doConfirm(court.id)};cb.appendChild(kb);
        }
      }else{
        var fb=mkBtn('🏁終了','btn bd bsm');fb.onclick=function(){doFinish(court.id)};cb.appendChild(fb);
      }
    })(c);
    card.appendChild(cb);
    el.appendChild(card);
  }
}

function mkBtn(txt,cls){var b=document.createElement('button');b.className=cls;b.textContent=txt;return b;}

// チーム表示（男女色分け対応）
function makeTeamEl(team){
  var wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:.1rem';
  for(var ti=0;ti<team.length;ti++){
    var m=team[ti];
    var line=document.createElement('div');
    line.style.cssText='display:flex;align-items:center;gap:.3rem';
    var icon=document.createElement('span');icon.textContent='🏸';
    icon.style.fontSize='.85em';
    var nm=document.createElement('span');
    nm.textContent=m.name;
    nm.className=m.gender==='male'?'name-male':'name-female';
    line.appendChild(icon);line.appendChild(nm);
    wrap.appendChild(line);
  }
  // & 記号
  if(team.length===2){
    var amp=document.createElement('div');
    amp.textContent='&';
    amp.style.cssText='font-size:.75em;color:var(--paw);font-weight:700;line-height:1';
    wrap.insertBefore(amp,wrap.children[1]);
  }
  return wrap;
}

// フリー待機
function drawFree(){
  var free=[];
  for(var i=0;i<MB.length;i++) if(MB[i].status==='free') free.push(MB[i]);
  document.getElementById('fcnt').textContent=free.length;
  var el=document.getElementById('fchips');el.innerHTML='';
  if(free.length===0){el.innerHTML='<span style="color:var(--text-lt);font-size:.75rem">フリーのメンバーはいません</span>';return;}
  for(var i=0;i<free.length;i++){
    var s=document.createElement('span');s.className='chip';
    s.textContent=(free[i].gender==='male'?'♂':'♀')+' '+free[i].name;
    el.appendChild(s);
  }
}

// ── 会員一覧 ──────────────────────────────────────────
function drawRoster(){
  var el=document.getElementById('rlist');el.innerHTML='';
  if(RS.length===0){
    el.innerHTML='<div style="text-align:center;padding:.9rem;color:var(--text-lt)"><img src="./img/good.png" style="width:2.5rem;height:2.5rem;object-fit:contain;vertical-align:middle"> まだ会員がいません</div>';
    return;
  }
  // 参加者を上、欠席を下に表示
  var sorted=RS.slice().sort(function(a,b){
    if(a.attending&&!b.attending)return -1;
    if(!a.attending&&b.attending)return 1;
    return 0;
  });
  for(var i=0;i<sorted.length;i++){
    (function(member){
      var row=document.createElement('div');
      row.className='crow'+(member.attending?' attending':'');

      // 性別アイコン
      var gi=document.createElement('div');
      gi.className='gicon '+(member.gender==='male'?'gm':'gf');
      gi.textContent=member.gender==='male'?'♂':'♀';
      row.appendChild(gi);

      // 名前・レベル
      var info=document.createElement('div');info.className='crow-info';
      var nm=document.createElement('div');nm.className='crow-name';nm.style.color=member.gender==='female'?'#D44040':'';nm.style.fontWeight='800';nm.textContent=member.name;
      info.appendChild(nm);
      var sub=document.createElement('div');sub.className='crow-sub';
      var lv=document.createElement('span');lv.className='tag '+LEVEL_TAGS[member.level||0];
      lv.textContent=LEVELS[member.level||0];
      sub.appendChild(lv);
      info.appendChild(sub);
      row.appendChild(info);

      // 出欠ボタン
      var attBtn=document.createElement('button');
      attBtn.className='att-btn '+(member.attending?'att-on':'att-off');
      attBtn.textContent=member.attending?'✓ 参加':'欠席';
      attBtn.onclick=function(){
        // RSの中から元のインデックスを探す
        for(var ri=0;ri<RS.length;ri++){
          if(RS[ri].id===member.id){RS[ri].attending=!RS[ri].attending;break;}
        }
        saveAll();draw();
      };
      row.appendChild(attBtn);

      // 削除ボタン
      var db=document.createElement('button');db.className='btn bd bxs';db.textContent='🗑';
      db.onclick=function(){
        askDel('「'+member.name+'」を会員から削除しますか？',function(){
          for(var ri=0;ri<RS.length;ri++){
            if(RS[ri].id===member.id){RS.splice(ri,1);break;}
          }
          saveAll();draw();toast('削除しました');
        });
      };
      row.appendChild(db);
      el.appendChild(row);
    })(sorted[i]);
  }
}

// メンバー一覧
function drawMembers(){
  var el=document.getElementById('mlist');el.innerHTML='';
  if(MB.length===0){
    el.innerHTML='<div style="text-align:center;padding:.9rem;color:var(--text-lt)"><img src="./img/good.png" style="width:2.5rem;height:2.5rem;object-fit:contain;vertical-align:middle"> まだメンバーがいません</div>';
    return;
  }
  for(var i=0;i<MB.length;i++){
    (function(idx){
      var m=MB[idx];
      var row=document.createElement('div');row.className='mrow';

      var top=document.createElement('div');top.className='mrow-top';
      var gi=document.createElement('div');gi.className='gicon '+(m.gender==='male'?'gm':'gf');
      gi.textContent=m.gender==='male'?'♂':'♀';
      top.appendChild(gi);
      var nm=document.createElement('div');nm.className='mname';nm.style.color=m.gender==='female'?'#D44040':'';nm.style.fontWeight='800';nm.textContent=m.name;
      top.appendChild(nm);
      row.appendChild(top);

      var bot=document.createElement('div');bot.className='mrow-bot';
      var lvtag=document.createElement('span');lvtag.className='tag '+LEVEL_TAGS[m.level||0];
      lvtag.style.fontSize='.62rem';lvtag.textContent=LEVELS[m.level||0];
      bot.appendChild(lvtag);
      var tg=document.createElement('span');tg.className='tag';
      if(m.status==='free'){tg.className+=' tf';tg.innerHTML='<img src="'+CAT_FREE+'" class="free-img" alt="">フリー'}
      else if(m.status==='playing'){tg.className+=' tp';tg.textContent='🏸試合中'}
      else{tg.className+=' tr';tg.textContent='💤休憩中'}
      bot.appendChild(tg);
      var sp=document.createElement('div');sp.style.flex='1';bot.appendChild(sp);

      var lsel=document.createElement('select');
      lsel.className='inp inpsm';lsel.style.cssText='width:auto;max-width:68px';
      var lopts=[['0','🌱初心'],['1','🔵初級'],['2','🟡中級'],['3','🔴上級']];
      for(var li=0;li<lopts.length;li++){
        var lo=document.createElement('option');lo.value=lopts[li][0];lo.textContent=lopts[li][1];
        if((m.level||0).toString()===lopts[li][0])lo.selected=true;lsel.appendChild(lo);
      }
      lsel.onchange=function(){MB[idx].level=parseInt(this.value);saveAll();draw()};
      if(m.status==='playing') lsel.disabled=true;
      bot.appendChild(lsel);

      var sel=document.createElement('select');
      sel.className='inp inpsm';sel.style.cssText='width:auto;max-width:72px';
      if(m.status==='playing'){
        sel.disabled=true;var o=document.createElement('option');o.textContent='試合中';sel.appendChild(o);
      }else{
        [['free','フリー'],['resting','休憩中']].forEach(function(p){
          var o=document.createElement('option');o.value=p[0];o.textContent=p[1];
          if(m.status===p[0])o.selected=true;sel.appendChild(o);
        });
        sel.onchange=function(){MB[idx].status=this.value;saveAll();draw()};
      }
      bot.appendChild(sel);

      var db=document.createElement('button');db.className='btn bd bxs';db.textContent='🗑';
      if(m.status==='playing'){db.disabled=true;}
      else{
        db.onclick=function(){
          var name=MB[idx].name;
          askDel('「'+name+'」を削除しますか？',function(){
            var delId=MB[idx].id;
            MB.splice(idx,1);
            var nfp=[];for(var pi=0;pi<FP.length;pi++){if(FP[pi][0]!==delId&&FP[pi][1]!==delId)nfp.push(FP[pi]);}
            FP=nfp;saveAll();draw();toast('削除しました');
          });
        };
      }
      bot.appendChild(db);
      row.appendChild(bot);
      el.appendChild(row);
    })(i);
  }
}

// 固定ペア
function drawPairs(){
  var el=document.getElementById('plist');el.innerHTML='';
  if(FP.length===0){el.innerHTML='<div style="color:var(--text-lt);font-size:.78rem">固定ペアはまだありません</div>';return;}
  for(var i=0;i<FP.length;i++){
    (function(idx){
      var fp=FP[idx];var ma='?',mb='?';
      for(var mi=0;mi<MB.length;mi++){if(MB[mi].id===fp[0])ma=MB[mi].name;if(MB[mi].id===fp[1])mb=MB[mi].name;}
      var row=document.createElement('div');row.className='prow';
      var lbl=document.createElement('span');lbl.style.cssText='font-weight:700;font-size:.8rem';
      lbl.textContent='🔗 '+ma+' & '+mb;
      var btn=mkBtn('解除','btn bd bxs');
      btn.onclick=function(){FP.splice(idx,1);saveAll();draw();toast('固定ペアを解除しました')};
      row.appendChild(lbl);row.appendChild(btn);el.appendChild(row);
    })(i);
  }
}

// コート設定

  var el=document.getElementById('cmlist');el.innerHTML='';
  for(var i=0;i<SS.courts.length;i++){
    (function(court){
      var wrap=document.createElement('div');
      wrap.style.cssText='margin-bottom:.6rem;background:var(--cream);border-radius:12px;padding:.6rem .75rem;border:1px solid var(--border)';

      var modeRow=document.createElement('div');modeRow.style.cssText='display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem;flex-wrap:wrap';

      mlbl.textContent='試合形式';modeRow.appendChild(mlbl);
      [['doubles','ダブルス'],['mixed','ミックスD']].forEach(function(p){

      llbl.textContent='レベル';lvRow.appendChild(llbl);
      var lsel=document.createElement('select');lsel.className='inp inpsm';lsel.style.cssText='flex:1';
      for(var oi=0;oi<COURT_LEVEL_ORDER.length;oi++){
        var key=COURT_LEVEL_ORDER[oi];var o=document.createElement('option');
        o.value=key;o.textContent=COURT_LEVEL_LABELS[key];
        if(court.clevel===key)o.selected=true;lsel.appendChild(o);

    })(SS.courts[i]);

// 出場回数
function drawCount(){
  var el=document.getElementById('pclist');el.innerHTML='';
  if(MB.length===0){el.innerHTML='<span style="color:var(--text-lt);font-size:.78rem">メンバーを登録してください</span>';return;}
  var sorted=MB.slice().sort(function(a,b){return(PC[b.id]||0)-(PC[a.id]||0)});
  for(var i=0;i<sorted.length;i++){
    var m=sorted[i];var chip=document.createElement('div');chip.className='cchip';
    var nm=document.createElement('span');nm.style.color='var(--text-mid)';nm.textContent=m.name;
    var badge=document.createElement('span');badge.className='cbadge';badge.textContent=(PC[m.id]||0)+'回';
    chip.appendChild(nm);chip.appendChild(badge);el.appendChild(chip);
  }
}

// ペア選択
function drawPairSelects(){
  ['pa','pb'].forEach(function(id){
    var sel=document.getElementById(id);var cur=sel.value;
    sel.innerHTML='<option value="">選択…</option>';
    for(var i=0;i<MB.length;i++){
      var o=document.createElement('option');o.value=MB[i].id;o.textContent=MB[i].name;
      if(MB[i].id===cur)o.selected=true;sel.appendChild(o);
    }
  });
}

// =====================================================
// 会員アクション
// =====================================================
function addRoster(){
  var name=document.getElementById('rname').value.trim();
  var gender=document.getElementById('rgender').value;
  var level=parseInt(document.getElementById('rlevel').value);
  if(!name){toast('名前を入力してください');return}
  for(var i=0;i<RS.length;i++){if(RS[i].name===name){toast('同じ名前がすでにいます');return}}
  RS.push({id:nid(),name:name,gender:gender,level:level,attending:false});
  document.getElementById('rname').value='';
  saveAll();draw();toast(name+' を会員登録しました');
}

function resetAttendance(){
  for(var i=0;i<RS.length;i++) RS[i].attending=false;
  saveAll();draw();toast('出欠をリセットしました');
}

function applyRosterToMembers(){
  var attending=[];
  for(var i=0;i<RS.length;i++){if(RS[i].attending) attending.push(RS[i]);}
  if(attending.length===0){toast('参加メンバーがいません');return}
  if(attending.length>40){toast('参加者が40人を超えています');return}

  // 既存メンバーのステータスをリセット・コートもクリア
  MB=[];FP=[];
  for(var i=0;i<SS.courts.length;i++){SS.courts[i].draw=null;SS.courts[i].ok=false;SS.courts[i].pids=[];}

  // 参加者をメンバーとして追加（出場回数は引き継ぎ）
  for(var i=0;i<attending.length;i++){
    var r=attending[i];
    MB.push({id:r.id,name:r.name,gender:r.gender,level:r.level,status:'free'});
  }
  saveAll();draw();
  toast('✅ '+attending.length+'人をメンバーに反映しました');
  goTab('members');
}

// =====================================================
// メンバーアクション
// =====================================================
function addMember(){
  var name=document.getElementById('iname').value.trim();
  var gender=document.getElementById('igender').value;
  var level=parseInt(document.getElementById('ilevel').value);
  if(!name){toast('名前を入力してください');return}
  if(MB.length>=40){toast('最大40人まで');return}
  for(var i=0;i<MB.length;i++){if(MB[i].name===name){toast('同じ名前がすでにいます');return}}
  MB.push({id:nid(),name:name,gender:gender,level:level,status:'free'});
  document.getElementById('iname').value='';
  saveAll();draw();toast(name+' を追加しました 🐾');
}

function askDeleteAll(){
  if(MB.length===0){toast('メンバーがいません');return}
  askDel('全メンバー（'+MB.length+'人）を削除しますか？\n固定ペア・出場回数もリセットされます',function(){
    MB=[];FP=[];PC={};
    for(var i=0;i<SS.courts.length;i++){SS.courts[i].draw=null;SS.courts[i].ok=false;SS.courts[i].pids=[]}
    saveAll();draw();toast('全員削除しました');
  });
}

function addPair(){
  var a=document.getElementById('pa').value;var b=document.getElementById('pb').value;
  if(!a||!b||a===b){toast('異なる2人を選んでください');return}
  var pair=[a,b].sort();
  for(var i=0;i<FP.length;i++){var fp=FP[i].slice().sort();if(fp[0]===pair[0]&&fp[1]===pair[1]){toast('このペアはすでに登録済みです');return}}
  FP.push(pair);
  document.getElementById('pa').value='';document.getElementById('pb').value='';
  saveAll();draw();
  var ma='',mb='';
  for(var i=0;i<MB.length;i++){if(MB[i].id===a)ma=MB[i].name;if(MB[i].id===b)mb=MB[i].name}
  toast('🔗 '+ma+' & '+mb+' を固定しました');
}

function setN(n){
  var ids=['A','B','C','D'];var nc=[];
  for(var i=0;i<n;i++){
    var found=null;
    for(var ci=0;ci<SS.courts.length;ci++){if(SS.courts[ci].id===ids[i]){found=SS.courts[ci];break}}
    nc.push(found||{id:ids[i],name:ids[i]+'コート',mode:'doubles',clevel:'all',draw:null,ok:false,pids:[]});
  }
  SS.n=n;SS.courts=nc;saveAll();draw();
}

// =====================================================
// 抽選ロジック
// =====================================================
function shuffle(a){
  var r=a.slice();
  for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=r[i];r[i]=r[j];r[j]=t}
  return r;
}

function priorityShuffle(arr){
  if(arr.length===0)return arr;
  var groups={};
  for(var i=0;i<arr.length;i++){var c=PC[arr[i].id]||0;if(!groups[c])groups[c]=[];groups[c].push(arr[i]);}
  var counts=Object.keys(groups).map(Number).sort(function(a,b){return a-b});
  var result=[];
  for(var ci=0;ci<counts.length;ci++){var g=shuffle(groups[counts[ci]]);for(var gi=0;gi<g.length;gi++)result.push(g[gi]);}
  return result;
}

function mkKey(t1,t2){
  var s1=t1.slice().sort().join('|');var s2=t2.slice().sort().join('|');
  return [s1,s2].sort().join('||');
}

function pairAvgCount(pair){return((PC[pair[0].id]||0)+(PC[pair[1].id]||0))/2;}

function genDraw(court){
  var clvInfo=COURT_LEVELS[court.clevel]||COURT_LEVELS['all'];
  var allowedLevels=clvInfo.levels;
  var free=[];
  for(var i=0;i<MB.length;i++){
    if(MB[i].status!=='free')continue;
    var lv=MB[i].level||0;var ok=false;
    for(var li=0;li<allowedLevels.length;li++){if(allowedLevels[li]===lv){ok=true;break}}
    if(ok)free.push(MB[i]);
  }
  if(free.length<4)return null;

  var mode=court.mode;
  var lastKey=court.draw?court.draw.key:null;
  var fixedUsed={};var fixedPairs2=[];
  for(var fi=0;fi<FP.length;fi++){
    var fp=FP[fi];var pa=null,pb=null;
    for(var mi=0;mi<free.length;mi++){if(free[mi].id===fp[0])pa=free[mi];if(free[mi].id===fp[1])pb=free[mi];}
    if(!pa||!pb)continue;
    if(mode==='mixed'&&pa.gender===pb.gender)continue;
    if(fixedUsed[pa.id]||fixedUsed[pb.id])continue;
    fixedPairs2.push([pa,pb]);fixedUsed[pa.id]=true;fixedUsed[pb.id]=true;
  }
  var rem=free.filter(function(m){return!fixedUsed[m.id];});
  var remPairs=[];
  if(mode==='mixed'){
    var males=[],females=[];
    for(var mi2=0;mi2<rem.length;mi2++){if(rem[mi2].gender==='male')males.push(rem[mi2]);else females.push(rem[mi2]);}
    males=priorityShuffle(males);females=priorityShuffle(females);
    for(var xi=0;xi<Math.min(males.length,females.length);xi++) remPairs.push([males[xi],females[xi]]);
  }else{
    var r=priorityShuffle(rem);
    for(var ri2=0;ri2+1<r.length;ri2+=2) remPairs.push([r[ri2],r[ri2+1]]);
  }
  var allPairPool=[];
  for(var fpi=0;fpi<fixedPairs2.length;fpi++) allPairPool.push({pair:fixedPairs2[fpi],avg:pairAvgCount(fixedPairs2[fpi]),fixed:true});
  for(var rpi=0;rpi<remPairs.length;rpi++) allPairPool.push({pair:remPairs[rpi],avg:pairAvgCount(remPairs[rpi]),fixed:false});
  allPairPool.sort(function(a,b){
    if(Math.abs(a.avg-b.avg)>0.01)return a.avg-b.avg;
    if(a.fixed&&!b.fixed)return -1;if(!a.fixed&&b.fixed)return 1;
    return Math.random()-.5;
  });
  if(allPairPool.length<2)return null;
  var candLen=Math.min(allPairPool.length,4);
  for(var att=0;att<40;att++){
    var pickFrom=Math.min(2+Math.floor(att/8),candLen);
    var cands=allPairPool.slice(0,pickFrom).map(function(x){return x.pair;});
    var sp=shuffle(cands);if(sp.length<2)continue;
    var p1=sp[0],p2=sp[1];
    var mk=mkKey([p1[0].id,p1[1].id],[p2[0].id,p2[1].id]);
    if(mk!==lastKey||att>25)return{t1:p1,t2:p2,key:mk};
  }
  return null;
}

function getC(id){for(var i=0;i<SS.courts.length;i++) if(SS.courts[i].id===id) return SS.courts[i];return null}

function doDraw(id){
  var c=getC(id);if(!c)return;
  var r=genDraw(c);
  if(!r){var clvInfo=COURT_LEVELS[c.clevel]||COURT_LEVELS['all'];toast('人数が足りないにゃ😿（'+clvInfo.label+'のフリーメンバーが4人未満です）');return;}
  c.draw=r;c.ok=false;saveAll();draw();
}

function doRedo(id){
  var c=getC(id);if(!c)return;
  var prev=c.draw;c.draw=null;
  var r=genDraw(c);
  c.draw=r||prev;c.ok=false;saveAll();draw();
}

function doConfirm(id){
  var c=getC(id);if(!c||!c.draw)return;
  var ids=[];
  for(var i=0;i<c.draw.t1.length;i++) ids.push(c.draw.t1[i].id);
  for(var i=0;i<c.draw.t2.length;i++) ids.push(c.draw.t2[i].id);
  c.ok=true;c.pids=ids;
  for(var i=0;i<ids.length;i++){
    for(var mi=0;mi<MB.length;mi++){if(MB[mi].id===ids[i]){MB[mi].status='playing';break}}
    PC[ids[i]]=(PC[ids[i]]||0)+1;
  }
  saveAll();draw();toast('✅ 試合確定！楽しんでにゃ🏸');
}

function doFinish(id){
  var c=getC(id);if(!c)return;
  for(var i=0;i<c.pids.length;i++){
    for(var mi=0;mi<MB.length;mi++){if(MB[mi].id===c.pids[i]){MB[mi].status='free';break}}
  }
  c.draw=null;c.ok=false;c.pids=[];saveAll();draw();toast('🏁 試合終了！お疲れ様でした🐱');
}

function resetAll(){
  for(var i=0;i<MB.length;i++) MB[i].status='free';
  for(var i=0;i<SS.courts.length;i++){SS.courts[i].draw=null;SS.courts[i].ok=false;SS.courts[i].pids=[];}
  saveAll();draw();toast('🔄 全員フリーに戻しました');
}

function resetCount(){PC={};saveAll();draw();toast('🔄 出場回数をリセットしました')}

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});
}

draw();
</script>
